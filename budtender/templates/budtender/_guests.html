{% if error %}<p class="err">{{ error }}</p>{% endif %}
{% if guests %}
<div class="scroll"><table>
  <tbody>
  {% for g in guests %}
    <tr>
      <td>{{ g.name }}{% if g.patient_type %}<br><span class="muted">{{ g.patient_type }}</span>{% endif %}</td>
      <td class="muted">{{ g.phone }}</td>
      <td><button class="ghost" style="min-height:34px;padding:5px 11px"
                  hx-post="{% url 'profile' %}" hx-vals='{"acct": "{{ g.acct_id }}"}'
                  hx-target="#profile">Select</button></td>
    </tr>
  {% endfor %}
  </tbody>
</table></div>
{% elif query %}<p class="muted">No guests matched “{{ query }}”.</p>{% endif %}
