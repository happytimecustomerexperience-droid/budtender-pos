{% if error %}<p class="err">{{ error }}</p>{% endif %}
{% if guests %}
<ul class="ac-list">
  {% for g in guests %}
  <li class="ac-item"
      {% if mode == 'start' %}data-fill-phone="{{ g.phone }}" role="button" tabindex="0"
      {% else %}role="button" tabindex="0"
        hx-post="{% url 'profile' %}" hx-vals='{"acct": "{{ g.acct_id }}"}' hx-target="#profile"{% endif %}>
    <div class="ac-top">
      <span class="ac-name">{{ g.name }}</span>
      {% if g.pt_label %}<span class="pill {% if g.is_medical %}pill-med{% else %}pill-rec{% endif %}">{{ g.pt_label }}</span>{% endif %}
    </div>
    <div class="ac-sub">📞 {{ g.phone }}{% if g.last %} · last {{ g.last }}{% endif %}</div>
  </li>
  {% endfor %}
</ul>
{% elif query %}<p class="muted ac-empty">No customer matched “{{ query }}”.</p>{% endif %}
