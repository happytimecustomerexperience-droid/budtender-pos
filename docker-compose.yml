# Budtender POS — runs behind the existing host-mode Traefik (docker provider).
# Traefik auto-discovers this container by the labels below and issues TLS via the
# `letsencrypt` resolver, exactly like the voice/nordland services on this VPS.
# No ports are published — Traefik reaches the container on budtender-pos_default.
#
#   docker compose up -d --build
#
# Requires a .env in this dir (all secrets) and an A record:
#   checkout.3dpresence.com -> this VPS public IP   (Let's Encrypt HTTP challenge).
services:
  web:
    build: .
    env_file:
      - .env
    environment:
      BUDTENDER_DB_PATH: /data/db.sqlite3   # persisted on the named volume
      REDIS_URL: redis://redis:6379/0       # shared cache (menu served warm, no lag)
    volumes:
      - budtender_data:/data
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - default
      - hht                                  # reach happytime-budtender's Postgres (read-only)
    labels:
      - traefik.enable=true
      - traefik.docker.network=budtender-pos_default
      - traefik.http.routers.checkout.rule=Host(`checkout.3dpresence.com`)
      - traefik.http.routers.checkout.entrypoints=web,websecure
      - traefik.http.routers.checkout.tls=true
      - traefik.http.routers.checkout.tls.certresolver=letsencrypt
      - traefik.http.services.checkout.loadbalancer.server.port=8000

  # Shared cache so all web workers + the warmer hit ONE warm inventory entry.
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Keeps the per-store inventory cache hot (~every 8 min) so customer requests
  # never pay the slow product_SearchV2 pull — smooth for 3-5 concurrent budtenders.
  warmer:
    build: .
    env_file:
      - .env
    environment:
      BUDTENDER_DB_PATH: /data/db.sqlite3
      REDIS_URL: redis://redis:6379/0
    volumes:
      - budtender_data:/data
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - default
      - hht
    command: sh -c "sleep 10; while true; do python manage.py warm_menu || true; sleep 480; done"

networks:
  default:
  # happytime-budtender's compose network — lets us reach its `db` for read-only
  # customer profiles. CUSTOMER_DB_DSN (in .env) = postgresql://USER:PW@db:5432/budtender
  hht:
    external: true
    name: happytime-budtender_default

volumes:
  budtender_data:
